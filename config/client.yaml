# Параметры клиента для расчёта экономии.
#
# Все числа, которые подставляются в narrative и KPI демо, живут здесь.
# Чтобы подготовить демо под нового клиента — правите ЭТОТ файл, код трогать не надо.
#
# Пересчитываемые величины (годовая экономия, сколько минут/день и т.д.)
# считаются автоматически из `rub_per_production_minute` и `working_days_per_year`.

client_name: "Maven Roasters"                     # Показывается в title, narrative
client_name_short: "Maven Roasters"               # Для коротких подписей
brand_style: "Maven Roasters (Kaggle, 2 года)"    # Датасет в футере
# Чтобы пересобрать под конкретного клиента (Союз ЛУР, VERONESE, другого) —
# замените client_name и brand_style на их имя, остальное пересчитается.

# Размер производства (источник: техлиста клиента или наши допущения)
lines_count: 3                       # сколько фасовочных линий
shifts_per_day: 1                    # 1 или 2 смены в сутки
hours_per_shift: 8                   # стандартная смена = 8 ч
working_days_per_year: 220           # ≈220 рабочих дней в году для B2B-FMCG

# Экономика — ключевые цифры для hero-KPI.
# «Упущенная выручка при простое» = средняя валовая выручка с минуты производства.
# Для VERONESE: ~7700 ₽/мин оборот × 45% маржа = ~3500 ₽/мин упущенной прибыли.
# Для другого клиента — подставить его цифры, всё остальное пересчитается.
rub_per_production_minute: 3500
currency_symbol: "₽"

# Ориентир для hero-заголовка. Если None — считается динамически из сэкономленных
# часов × дней × ₽/мин. Если хочется зафиксировать круглую цифру — укажите руками.
headline_annual_savings_mrub: null   # null = считать из данных

# Эмпирические данные про типичный FMCG-сегмент — для пояснений и CTA
mvp_price_usd:
  min: 50000
  max: 100000
full_rollout_price_usd:
  min: 150000
  max: 200000
typical_payback_months:
  min: 2
  max: 4
enterprise_comparison_price_usd_5y:
  min: 2000000
  max: 5000000
enterprise_comparison_name: "SAP IBP / Kinaxis"
